services:
  - type: web
    name: salamarecover-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    pythonVersion: "3.11.9"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AT_API_KEY
        sync: false
      - key: AT_USERNAME
        value: sandbox   # Change to live username before pilot
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://salamarecover-dashboard.vercel.app"]'
    healthCheckPath: /health
    autoDeploy: true
